services:
  - type: web
    name: mai-investment
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run --no-dev gunicorn webapp:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
